<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メールアドレス入力 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dist/output.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 2px;
            background: #ccc;
            z-index: 0;
        }

        .step {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #ccc;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .step.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .step.done {
            background: #ccc;
            border-color: #ccc;
            color: #fff;
        }

        

        

        

        
    
</style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <img src="images/icon_search.svg" class="menu-icon w-6 h-6 cursor-pointer" onclick="toggleSearch()" alt="検索">
        </header>

        <!-- Search Overlay -->
        <div id="searchOverlay" class="full-modal z-[4000]">
            <div class="modal-header justify-start gap-3 px-5 py-3">
                <button class="modal-close text-[1.8rem] leading-none bg-transparent border-none p-0" onclick="document.getElementById('searchOverlay').classList.remove('active')"><img
                        src="images/icon_arrow2.svg" alt="戻る"
                        class="w-6 h-6 pointer-events-none"></button>
                <div class="flex-1 relative">
                    <input type="text" placeholder="MLSSを検索"
                        class="w-full py-[10px] pr-[40px] pl-[16px] rounded-[20px] border-none bg-[#f0f0f0] text-[1rem] outline-none">
                    <img src="images/icon_search.svg"
                        class="absolute right-[12px] top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
                </div>
            </div>
            <div class="modal-body p-0">
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">藤田悠也</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">結芽乃 路上ライブ</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">Synphony</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">天野なつ</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">日本橋イベント</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
            </div>
        </div>
        <script>
            function toggleSearch() {
                document.getElementById('searchOverlay').classList.toggle('active');
            }
        </script>

        <main>
            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step active">2</div>
                <div class="step">3</div>
                <div class="step">4</div>
                <div class="step">5</div>
            </div>

            <div class="form-container">
                <div class="h-[290px]">
                    <h2 class="section-title">メール認証</h2>
                    <p>メールアドレスをご入力ください。</p>

                    <input type="email" class="input-field" placeholder="example@musicliver.com">

                    <div class="hint-text">
                        本人確認のためのメールが届きます
                    </div>
                </div>

                <a href="register_mail_verify.html" class="btn btn-primary mb-4">送信</a>
                <a href="register_start1.html" class="btn btn-secondary">戻る</a>
            </div>
        </main>
    </div>
    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
