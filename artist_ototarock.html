<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOTAROCK | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .artist-hero {
            position: relative;
            width: 100%;
            height: 60vh;
        }

        .artist-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .artist-hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 60px 20px 20px;
            background: linear-gradient(to top, rgba(11, 12, 16, 1) 10%, transparent);
        }

        .artist-hero-name {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 4px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            color: #fff;
        }

        .artist-sns {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .sns-icon {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: inline-block;
        }

        .biography-section {
            padding: 0 20px 20px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Tipping Section */
        .tipping-section {
            background: var(--bg-card);
            margin: 20px 20px 100px;
            /* フッタと被らないよう下余白確保 */
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 102, 161, 0.2);
        }

        .tipping-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 16px;
            text-align: center;
            color: var(--accent-pink);
        }

        .tip-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .tip-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tip-btn:active {
            background: rgba(255, 102, 161, 0.1);
            border-color: var(--accent-pink);
            transform: translateY(-2px);
        }

        .tip-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .tip-label {
            font-size: 0.8rem;
            color: var(--text-primary);
        }

        .point-info {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: var(--accent-cyan);
        }

        .small-link {
            display: block;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="map.html">会場マップ</a>
            <a href="schedule.html">ライブスケジュール</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="admin_listener.html">マイページ</a>
        </div>

        <main>
            <div class="artist-hero">
                <img src="images/artist_ototarock.jpg" alt="OTOTAROCK">
                <div class="artist-hero-overlay">
                    <div class="artist-sns">
                        <span class="sns-icon"></span>
                        <span class="sns-icon"></span>
                    </div>
                    <h2 class="artist-hero-name">OTOTAROCK</h2>
                </div>
            </div>

            <div class="biography-section">
                日本橋を中心に活動するアーティスト。アコースティックギター一本で力強い歌声を響かせます。
            </div>

            <div class="tipping-section">
                <div class="tipping-title">CheerPointでアイテムを送ろう！</div>

                <div class="tip-grid">
                    <div class="tip-btn" onclick="handleTip('star')">
                        <div class="tip-icon">⭐</div>
                        <div class="tip-label">スター</div>
                    </div>
                    <div class="tip-btn" onclick="handleTip('heart')">
                        <div class="tip-icon">💖</div>
                        <div class="tip-label">ハート</div>
                    </div>
                    <div class="tip-btn" onclick="handleTip('firework')">
                        <div class="tip-icon">🎇</div>
                        <div class="tip-label">花火</div>
                    </div>
                    <div class="tip-btn" onclick="handleTip('clap')">
                        <div class="tip-icon">👏</div>
                        <div class="tip-label">拍手</div>
                    </div>
                    <div class="tip-btn" onclick="handleTip('cheer')">
                        <div class="tip-icon">🔥</div>
                        <div class="tip-label">応援</div>
                    </div>
                    <div class="tip-btn" onclick="handleTip('message')">
                        <div class="tip-icon">💬</div>
                        <div class="tip-label">メッセージ</div>
                    </div>
                </div>

                <div class="point-info">
                    0 ポイント保有
                </div>

                <a href="law.html" class="small-link">特定商取引法に基づく表記</a>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="map.html" class="nav-item">
                <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
                <span>MAP</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                <span>LIVE</span>
            </a>
            <a href="artists.html" class="nav-item active">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="admin_listener.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>

        <script>
            function toggleMenu() {
                document.getElementById('hamburgerMenu').classList.toggle('open');
            }

            function handleTip(itemType) {
                // 仮実装: アイテムを選択したら送付確認画面（未登録なら登録フロー等）へ
                window.location.href = 'tipping_confirm.html?artist=ototarock&item=' + itemType;
            }
        </script>
    </div>
</body>

</html>
