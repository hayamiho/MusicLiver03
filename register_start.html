<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー登録 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dist/output.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 2px;
            background: #ccc;
            z-index: 0;
        }

        .step {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            /* 白の不透明度を100に（後ろの線が透けないように） */
            border: 2px solid #ccc;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .step.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .registration-content {
            padding: 20px;
            text-align: center;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 30px;
        }

        .item-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .sub-notice {
            font-size: 0.8rem;
            color: var(--accent-cyan);
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <img src="images/icon_search.svg" class="menu-icon w-6 h-6 cursor-pointer" onclick="toggleSearch()" alt="検索">
        </header>

                <!-- Search Overlay -->
    <div id="searchOverlay" class="full-modal z-[4000]">
        <div class="modal-header justify-start gap-3 px-5 py-3">
            <button class="modal-close text-[1.8rem] leading-none bg-transparent border-none p-0" onclick="document.getElementById('searchOverlay').classList.remove('active')"><img src="images/icon_arrow2.svg" alt="戻る" class="w-6 h-6 pointer-events-none"></button>
            <div class="flex-1 relative">
                <input type="text" placeholder="MLSSを検索" class="w-full py-[10px] pr-[40px] pl-[16px] rounded-[20px] border-none bg-[#f0f0f0] text-[1rem] outline-none">
                <img src="images/icon_search.svg" class="absolute right-[12px] top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
            </div>
        </div>
        <div class="modal-body p-0">
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">藤田悠也</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">結芽乃 路上ライブ</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">Synphony</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">天野なつ</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">日本橋イベント</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
        </div>
    </div>
    <script>
        function toggleSearch() {
            document.getElementById('searchOverlay').classList.toggle('active');
        }
    </script>

        <main>
            <div class="step-indicator">
                <div class="step active">1</div>
                <div class="step">2</div>
                <div class="step">3</div>
                <div class="step">4</div>
                <div class="step">5</div>
            </div>

            <div class="registration-content">
                <div class="message-box">
                    <div class="item-icon" id="itemIcon">⭐</div>
                    <p>MusicLiverにユーザー登録すると、<br>アーティストに<span id="itemName">☆</span>を送れます</p>
                </div>

                <a href="register_phone.html" class="btn btn-primary mb-4">ユーザー登録する　<span
                        class="text-[0.8rem] font-normal">かんたん！3分で完了</span></a>

                <a href="artist_detail.html" class="btn btn-secondary">戻る</a>
            </div>
        </main>
    </div>

    <script>
        // URLから渡されたアイテム情報を取得して表示を切り替える（モック用）
        const params = new URLSearchParams(window.location.search);
        const item = params.get('item');
        const iconEl = document.getElementById('itemIcon');
        const nameEl = document.getElementById('itemName');

        if (item === 'heart') { iconEl.innerText = '💖'; nameEl.innerText = '♡'; }
        if (item === 'firework') { iconEl.innerText = '🎇'; nameEl.innerText = '花火'; }
        if (item === 'clap') { iconEl.innerText = '👏'; nameEl.innerText = '拍手'; }
        if (item === 'cheer') { iconEl.innerText = '🔥'; nameEl.innerText = '応援'; }
        if (item === 'message') { iconEl.innerText = '💬'; nameEl.innerText = 'メッセージ'; }

        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
