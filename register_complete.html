<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登録完了 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 2px;
            background: #ccc;
            z-index: 0;
        }

        .step {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            /* 白の不透明度を100に（後ろの線が透けないように） */
            border: 2px solid #ccc;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .step.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .step.done {
            background: #ccc;
            border-color: #ccc;
            color: #fff;
        }

        .complete-container {
            padding: 40px 20px;
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--accent-cyan);
            margin-bottom: 24px;
        }

        .btn-link {
            display: inline-block;
            margin-top: 16px;
            color: var(--text-secondary);
            text-decoration: underline;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

            <div class="hamburger-menu-content" id="hamburgerMenu">
      <a href="index.html">トップページ</a>
      <a href="#" onclick="event.preventDefault();const b=document.createElement('div');b.className='coming-soon-bubble';b.textContent='近日公開予定';b.style.left=(event.pageX-40)+'px';b.style.top=(event.pageY-40)+'px';document.body.appendChild(b);setTimeout(()=>b.remove(),1500);" style="color: #999;">全国のライブスケジュール一覧</a>
      <a href="live.html">現在演奏中のミュージシャン</a>
      <a href="artists.html">アーティスト一覧</a>
      <a href="mypage.html">マイページ</a>
    </div>

        <main>
            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step active">5</div>
            </div>

            <div class="complete-container">
                <div class="success-icon">🎉</div>
                <h2 class="section-title text-center">ユーザー登録が完了しました！</h2>

                <p class="mb-4 text-center">
                    続いて、ポイントの購入には<br>クレジットカードの登録が必要です。
                </p>

                <a href="credit_card.html" class="btn btn-primary mb-4">カード登録する</a>
                <a href="register_terms.html" class="btn btn-secondary mb-2">戻る</a>
                <br>
                <a href="artist_detail.html" class="btn-link">TOPに戻る</a>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="map.html" class="nav-item">
                <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
                <span>MAP</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                <span>LIVE</span>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="mypage.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
