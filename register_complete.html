<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登録完了 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 0;
        }

        .step {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .step.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .step.done {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.5);
            color: #000;
        }

        .complete-container {
            padding: 40px 20px;
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--accent-cyan);
            margin-bottom: 24px;
        }

        .btn-link {
            display: inline-block;
            margin-top: 16px;
            color: var(--text-secondary);
            text-decoration: underline;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <h1>Music Liver</h1>
            </div>
        </header>

        <main>
            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step active">5</div>
            </div>

            <div class="complete-container">
                <div class="success-icon">🎉</div>
                <h2 class="section-title text-center">ユーザー登録が完了しました！</h2>

                <p class="mb-4 text-center">
                    続いて、ポイントの購入には<br>クレジットカードの登録が必要です。
                </p>

                <a href="credit_card.html" class="btn btn-primary mb-4">登録にすすむ</a>
                <a href="register_terms.html" class="btn btn-secondary mb-2">戻る</a>
                <br>
                <a href="artist_detail.html" class="btn-link">TOPに戻る</a>
            </div>
        </main>
    </div>
</body>

</html>
