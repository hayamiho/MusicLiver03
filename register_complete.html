<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登録完了 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dist/output.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 2px;
            background: #ccc;
            z-index: 0;
        }

        .step {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            /* 白の不透明度を100に（後ろの線が透けないように） */
            border: 2px solid #ccc;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .step.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .step.done {
            background: #ccc;
            border-color: #ccc;
            color: #fff;
        }

        .complete-container {
            padding: 20px;
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--accent-cyan);
            margin-bottom: 24px;
        }

        .btn-link {
            display: inline-block;
            margin-top: 16px;
            color: var(--text-secondary);
            text-decoration: underline;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <img src="images/icon_search.svg" class="menu-icon w-6 h-6 cursor-pointer" onclick="toggleSearch()" alt="検索">
        </header>

        <!-- Search Overlay -->
        <div id="searchOverlay" class="full-modal z-[4000]">
            <div class="modal-header justify-start gap-3 px-5 py-3">
                <button class="modal-close text-[1.8rem] leading-none bg-transparent border-none p-0" onclick="document.getElementById('searchOverlay').classList.remove('active')"><img
                        src="images/icon_arrow2.svg" alt="戻る"
                        class="w-6 h-6 pointer-events-none"></button>
                <div class="flex-1 relative">
                    <input type="text" placeholder="MLSSを検索"
                        class="w-full py-[10px] pr-[40px] pl-[16px] rounded-[20px] border-none bg-[#f0f0f0] text-[1rem] outline-none">
                    <img src="images/icon_search.svg"
                        class="absolute right-[12px] top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
                </div>
            </div>
            <div class="modal-body p-0">
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">藤田悠也</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">結芽乃 路上ライブ</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">Synphony</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">天野なつ</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">日本橋イベント</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
            </div>
        </div>
        <script>
            function toggleSearch() {
                document.getElementById('searchOverlay').classList.toggle('active');
            }
        </script>

        <main>
            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step active">5</div>
            </div>

            <div class="complete-container">
                <div class="h-[290px]">
                    <div class="success-icon">🎉</div>
                    <h2 class="section-title text-center">ユーザー登録が完了しました！</h2>

                    <p class="mb-4 text-center">
                        MusicLiverサポートシステムをお楽しみください。
                    </p>
                </div>

                <a href="live.html" class="btn btn-primary mb-4">配信中のライブを見る</a>
                <a href="artists.html" class="btn btn-primary mb-2">アーティストを探す</a>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="#"
                onclick="event.preventDefault();const b=document.createElement('div');b.className='coming-soon-bubble';b.textContent='近日公開予定';b.style.left=(event.pageX-30)+'px';b.style.top=(event.pageY-40)+'px';document.body.appendChild(b);setTimeout(()=>b.remove(),1500);"
                class="nav-item grayscale opacity-50">
                <img src="images/icon_schedule.svg" alt="SCHEDULE" class="nav-icon">
                <span>SCHEDULE</span>
            </a>
            <a href="live.html" class="nav-item nav-live-highlight">
                <div class="nav-icon-wrapper">
                    <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                    <span>LIVE</span>
                </div>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="mypage.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
