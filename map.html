<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会場マップ | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 40px 20px 24px;
            text-align: center;
        }

        .map-section {
            padding: 0 20px 40px;
        }

        .main-map {
            width: 100%;
            border-radius: var(--border-radius);
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        .stage-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .stage-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .stage-info {
            padding: 16px;
        }

        .stage-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stage-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .dot-silver {
            color: #c0c0c0;
        }

        .dot-bronze {
            color: #cd7f32;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 共通ヘッダ -->
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="map.html">会場マップ</a>
            <a href="schedule.html">ライブスケジュール</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="admin_listener.html">マイページ</a>
        </div>

        <main>
            <div class="page-header">
                <h2 class="section-title" style="margin-bottom: 8px;">会場マップ</h2>
                <p class="text-secondary" style="font-size: 0.9rem; font-weight: 500;">日本橋エリアのライブステージ</p>
            </div>

            <div class="map-section">
                <!-- 全体マップ -->
                <img src="images/map.jpg" alt="全体マップ" class="main-map">

                <!-- SILVER STAGE -->
                <div class="stage-card">
                    <img src="images/map01SILVERSTAGE.jpg" alt="SILVER STAGE" class="stage-image">
                    <div class="stage-info">
                        <div class="stage-title"><span class="dot-silver">●</span>SILVER STAGE</div>
                        <div class="stage-desc">日本橋室町三丁目地下歩道</div>
                    </div>
                </div>

                <!-- BRONZE STAGE -->
                <div class="stage-card">
                    <img src="images/map02BRONZESTAGE.jpg" alt="BRONZE STAGE" class="stage-image">
                    <div class="stage-info">
                        <div class="stage-title"><span class="dot-bronze">●</span>BRONZE STAGE</div>
                        <div class="stage-desc">日本橋案内所前</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 共通フッタ -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="map.html" class="nav-item active">
                <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
                <span>MAP</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                <span>LIVE</span>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="admin_listener.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
