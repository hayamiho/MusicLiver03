<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 24px 20px 16px;
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid rgba(0, 123, 255, 0.2);
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .search-bar::placeholder {
            color: #999;
        }

        .artist-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 20px 40px;
        }

        .artist-card {
            position: relative;
            border-radius: var(--border-radius);
            overflow: hidden;
            /* 指示通り、顔を中心に正方形でトリミング */
            aspect-ratio: 1 / 1;
            display: block;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 2px solid #fff;
        }

        .artist-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            /* 顔が中心に来やすいよう少し上部を基準に */
            transition: transform 0.3s ease;
        }

        .artist-card:active .artist-img {
            transform: scale(1.05);
        }

        .artist-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 12px 12px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 100%);
        }

        .artist-name {
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 共通ヘッダ -->
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="map.html">会場マップ</a>
            <a href="schedule.html">ライブスケジュール</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="admin_listener.html">マイページ</a>
        </div>

        <main>
            <div class="page-header">
                <input type="text" class="search-bar" placeholder="🔍 アーティストを検索">
            </div>

            <div class="artist-grid" id="artistGrid">
                <!-- JSでランダム配置 -->
            </div>
        </main>

        <!-- 共通フッタ -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="map.html" class="nav-item">
                <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
                <span>MAP</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                <span>LIVE</span>
            </a>
            <a href="artists.html" class="nav-item active">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="admin_listener.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        // 本番データ：指示にある全アーティストの写真と氏名の組み合わせ
        const artists = [
            { name: "小杉ゆん", img: "images/artist_kosugiyun.jpg", link: "artist_kosugiyun.html" },
            { name: "村田和司", img: "images/artist_muratakazushi.jpg", link: "artist_muratakazushi.html" },
            { name: "虎鷹", img: "images/artist_kotaka_01.jpg", link: "artist_kotaka.html" },
            { name: "はせとも。", img: "images/artist_hasetomo_02.jpg", link: "artist_hasetomo.html" },
            { name: "鳥居れな", img: "images/artist_toriirena.jpg", link: "artist_toriirena.html" },
            { name: "はしもとねね", img: "images/artist_hashimotonene_02.jpg", link: "artist_hashimotonene.html" },
            { name: "AiAi", img: "images/artist_aiai.jpg", link: "artist_aiai.html" },
            { name: "冨十みと", img: "images/artist_tomitomito.jpg", link: "artist_tomitomito.html" },
            { name: "柳光絵", img: "images/artist_yanagimitsue.jpg", link: "artist_yanagimitsue.html" },
            { name: "OTOTAROCK", img: "images/artist_ototarock.jpg", link: "artist_ototarock.html" }
        ];

        // 配列をシャッフル（毎回の表示順をランダム化）
        const shuffled = artists.sort(() => 0.5 - Math.random());

        const grid = document.getElementById('artistGrid');
        shuffled.forEach(a => {
            const card = `<a href="${a.link}" class="artist-card">
        <img src="${a.img}" class="artist-img" alt="${a.name}">
        <div class="artist-info">
          <div class="artist-name">${a.name}</div>
        </div>
      </a>`;
            grid.innerHTML += card;
        });

        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
