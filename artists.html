<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dist/output.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .page-header {
            padding: 24px 20px 16px;
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid rgba(0, 123, 255, 0.2);
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .search-bar::placeholder {
            color: #999;
        }

        .artist-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 20px 40px;
        }

        .artist-card {
            position: relative;
            border-radius: var(--border-radius);
            overflow: hidden;
            aspect-ratio: 1 / 1;
            display: block;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 2px solid #fff;
        }

        .artist-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            transition: transform 0.3s ease;
        }

        .artist-card:active .artist-img {
            transform: scale(1.05);
        }

        .artist-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 12px 12px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 100%);
        }

        .artist-name {
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <img src="images/icon_search.svg" class="menu-icon w-6 h-6 cursor-pointer" onclick="toggleSearch()" alt="検索">
        </header>

                <!-- Search Overlay -->
    <div id="searchOverlay" class="full-modal z-[4000]">
        <div class="modal-header justify-start gap-3 px-5 py-3">
            <button class="modal-close text-[1.8rem] leading-none bg-transparent border-none p-0" onclick="document.getElementById('searchOverlay').classList.remove('active')"><img src="images/icon_arrow2.svg" alt="戻る" class="w-6 h-6 pointer-events-none"></button>
            <div class="flex-1 relative">
                <input type="text" placeholder="MLSSを検索" class="w-full py-[10px] pr-[40px] pl-[16px] rounded-[20px] border-none bg-[#f0f0f0] text-[1rem] outline-none">
                <img src="images/icon_search.svg" class="absolute right-[12px] top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
            </div>
        </div>
        <div class="modal-body p-0">
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">藤田悠也</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">結芽乃 路上ライブ</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">Synphony</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">天野なつ</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">日本橋イベント</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
        </div>
    </div>
    <script>
        function toggleSearch() {
            document.getElementById('searchOverlay').classList.toggle('active');
        }
    </script>

        <main>

    <script>

            { name: "祐生", img: "images/artist_yusei.jpg", link: "artist_yusei.html" }
        ];

        // 他の10名をシャッフル
        const shuffled = fixedOtherArtists.sort(() => 0.5 - Math.random());

        const grid = document.getElementById('artistGrid');
        shuffled.forEach(a => {
            const card = `<a href="${a.link}" class="artist-card">
        <img src="${a.img}" class="artist-img" alt="${a.name}">
        <div class="artist-info">
          <div class="artist-name">${a.name}</div>
        </div>
      </a>`;
            grid.innerHTML += card;
        });

        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
