<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メール認証 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dist/output.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 2px;
            background: #ccc;
            z-index: 0;
        }

        .step {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #ccc;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .step.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .step.done {
            background: #ccc;
            border-color: #ccc;
            color: #fff;
        }

        

        

        
    
</style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <img src="images/icon_search.svg" class="menu-icon w-6 h-6 cursor-pointer" onclick="toggleSearch()" alt="検索">
        </header>

        <!-- Search Overlay -->
        <div id="searchOverlay" class="full-modal z-[4000]">
            <div class="modal-header justify-start gap-3 px-5 py-3">
                <button class="modal-close text-[1.8rem] leading-none bg-transparent border-none p-0" onclick="document.getElementById('searchOverlay').classList.remove('active')"><img
                        src="images/icon_arrow2.svg" alt="戻る"
                        class="w-6 h-6 pointer-events-none"></button>
                <div class="flex-1 relative">
                    <input type="text" placeholder="MLSSを検索"
                        class="w-full py-[10px] pr-[40px] pl-[16px] rounded-[20px] border-none bg-[#f0f0f0] text-[1rem] outline-none">
                    <img src="images/icon_search.svg"
                        class="absolute right-[12px] top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
                </div>
            </div>
            <div class="modal-body p-0">
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">藤田悠也</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">結芽乃 路上ライブ</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">Synphony</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">天野なつ</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
                <div
                    class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                    <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">日本橋イベント</div>
                    <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
                </div>
            </div>
        </div>
        <script>
            function toggleSearch() {
                document.getElementById('searchOverlay').classList.toggle('active');
            }
        </script>

        <main>
            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step active">3</div>
                <div class="step">4</div>
                <div class="step">5</div>
            </div>

            <div class="form-container">
                <div class="h-[290px]">
                    <h2 class="section-title">メール認証</h2>
                    <p>メールに届いた4桁の認証番号をご入力ください。</p>

                    <input type="number" class="input-field" placeholder="1234" maxlength="4"
                        oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">

                    <div id="resend-message"
                        class="hidden bg-[rgba(52,199,89,0.1)] text-[#34c759] border border-[#34c759] p-2.5 rounded-lg text-[0.8rem] mb-4 font-bold">
                        新しい認証コードを送信しました。
                    </div>
                    <p class="mb-4 text-secondary text-[0.8rem]">※認証番号が届かない場合は：<a href="#" id="resend-btn"
                            class="text-[var(--accent-cyan)] font-bold">メールを再送</a></p>
                </div>

                <a href="register_terms.html" class="btn btn-primary mb-4">送信</a>
                <a href="register_mail.html" class="btn btn-secondary">戻る</a>
            </div>
        </main>
    </div>
    <script>
        document.getElementById('resend-btn').addEventListener('click', function (e) {
            e.preventDefault();
            const btn = this;
            const msg = document.getElementById('resend-message');

            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
            btn.innerText = '送信中...';

            setTimeout(() => {
                msg.style.display = 'block';
                btn.innerText = 'メールを再送';
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';

                setTimeout(() => {
                    msg.style.display = 'none';
                }, 3000);
            }, 1000);
        });

        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
