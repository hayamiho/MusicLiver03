<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小杉ゆん | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .artist-hero {
            position: relative;
            width: 100%;
            height: 60vh;
        }

        .artist-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .artist-hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 60px 20px 20px;
            background: linear-gradient(to top, var(--bg-color) 10%, transparent);
        }

        .artist-hero-name {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 4px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .artist-sns {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .sns-icon {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: inline-block;
        }

        .biography-section {
            padding: 0 20px 20px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Tipping Section */
        .tipping-section {
            background: var(--bg-card);
            margin: 20px;
            padding: 24px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 102, 161, 0.2);
        }

        .tipping-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 16px;
            text-align: center;
            color: var(--text-primary);
        }

        .tip-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .tip-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tip-btn:hover,
        .tip-btn:active {
            background: rgba(255, 102, 161, 0.1);
            border-color: var(--accent-pink);
            transform: translateY(-2px);
        }

        .tip-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .tip-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .point-info {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: var(--accent-cyan);
        }

        .small-link {
            display: block;
            text-align: center;
            font-size: 0.7rem;
            color: #666;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <a href="index.html">
                    <h1>Music Liver</h1>
                </a>
            </div>
            <div class="menu-icon">☰</div>
        </header>

        <main>
            <div class="artist-hero">
                <img src="https://images.unsplash.com/photo-1516575334481-fec8bb85c986?w=600&h=800&fit=crop" alt="小杉ゆん">
                <div class="artist-hero-overlay">
                    <div class="artist-sns">
                        <span class="sns-icon"></span>
                        <span class="sns-icon"></span>
                    </div>
                    <h2 class="artist-hero-name">小杉ゆん</h2>
                </div>
            </div>

            <div class="biography-section">
                日本橋を中心に活動するシンガーソングライター。アコースティックギター一本で力強い歌声を響かせます。毎週水曜日に定期路上ライブ開催中。（仮テキスト）
            </div>

            <div class="tipping-section">
                <div class="tipping-title">アイテムを送ろう！</div>

                <div class="tip-grid">
                    <div class="tip-btn" onclick="handleTip('star')">
                        <div class="tip-icon">⭐</div>
                        <div class="tip-label">☆</div>
                    </div>
                    <div class="tip-btn" onclick="handleTip('heart')">
                        <div class="tip-icon">💖</div>
                        <div class="tip-label">♡</div>
                    </div>
                    <div class="tip-btn" onclick="handleTip('firework')">
                        <div class="tip-icon">🎇</div>
                        <div class="tip-label">花火</div>
                    </div>
                    <div class="tip-btn" onclick="handleTip('clap')">
                        <div class="tip-icon">👏</div>
                        <div class="tip-label">拍手</div>
                    </div>
                    <div class="tip-btn" onclick="handleTip('cheer')">
                        <div class="tip-icon">🔥</div>
                        <div class="tip-label">応援</div>
                    </div>
                    <div class="tip-btn" onclick="handleTip('message')">
                        <div class="tip-icon">💬</div>
                        <div class="tip-label">メッセージ</div>
                    </div>
                </div>

                <div class="point-info">
                    0 ポイント保有
                </div>

                <a href="law.html" class="small-link">特定商取引法に基づく表記</a>
            </div>
        </main>

        <script>
            function handleTip(itemType) {
                // 仮実装：今回はユーザー状態によって遷移先を変えるモックとして、
                // 必ず「未登録」ルートの5-1（register_start.html）へ遷移させるようにします
                // （実際には localStorage 等で状態管理するか、モックとして固定リンク）
                window.location.href = 'register_start.html?item=' + itemType;
            }
        </script>
    </div>
</body>

</html>
