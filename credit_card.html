<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クレジットカード情報入力 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-container {
            padding: 30px 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .col {
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <h1>Music Liver</h1>
            </div>
        </header>

        <main>
            <div class="form-container">
                <h2 class="section-title text-center">クレジットカードの情報を<br>ご入力ください。</h2>

                <div class="form-group mt-4">
                    <label>クレジットカード番号</label>
                    <input type="tel" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19">
                </div>

                <div class="row">
                    <div class="col form-group">
                        <label>有効期限</label>
                        <input type="text" class="form-control" placeholder="MM / YY" maxlength="5">
                    </div>
                    <div class="col form-group">
                        <label>セキュリティコード</label>
                        <input type="tel" class="form-control" placeholder="123" maxlength="4">
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label>お名前（半角ローマ字）</label>
                    <input type="text" class="form-control" placeholder="TARO YAMADA">
                </div>

                <div style="text-align: center; margin-top: 30px;">
                    <a href="credit_card_complete.html" class="btn btn-primary mb-4">登録する</a>
                    <a href="register_complete.html" class="btn btn-secondary mb-2">戻る</a>
                    <br>
                    <a href="artist_detail.html"
                        style="color:var(--text-secondary); font-size: 0.9rem; text-decoration: underline; display: inline-block; margin-top: 16px;">TOPに戻る</a>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
