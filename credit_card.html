<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クレジットカード情報入力 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-container {
            padding: 30px 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 14px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .col {
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

            <div class="hamburger-menu-content" id="hamburgerMenu">
      <a href="index.html">トップページ</a>
      <a href="#" onclick="event.preventDefault();const b=document.createElement('div');b.className='coming-soon-bubble';b.textContent='近日公開予定';b.style.left=(event.pageX-40)+'px';b.style.top=(event.pageY-40)+'px';document.body.appendChild(b);setTimeout(()=>b.remove(),1500);" style="color: #999;">全国のライブスケジュール一覧</a>
      <a href="live.html">現在演奏中のミュージシャン</a>
      <a href="artists.html">アーティスト一覧</a>
      <a href="mypage.html">マイページ</a>
    </div>

        <main>
            <div class="form-container">
                <h2 class="section-title text-center" style="font-size: 1.15rem;">クレジットカードの情報を<br>ご入力ください。</h2>

                <div class="form-group mt-4">
                    <label>クレジットカード番号</label>
                    <input type="tel" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19">
                </div>

                <div class="row">
                    <div class="col form-group">
                        <label>有効期限</label>
                        <input type="text" class="form-control" placeholder="MM / YY" maxlength="5">
                    </div>
                    <div class="col form-group">
                        <label>セキュリティコード</label>
                        <input type="tel" class="form-control" placeholder="123" maxlength="4">
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label>お名前（半角ローマ字）</label>
                    <input type="text" class="form-control" placeholder="TARO YAMADA">
                </div>

                <div style="text-align: center; margin-top: 30px;">
                    <a href="credit_card_complete.html" class="btn btn-primary mb-4">登録する</a>
                    <a href="register_complete.html" class="btn btn-secondary mb-2">戻る</a>
                    <br>
                    <a href="artist_detail.html"
                        style="color:var(--text-secondary); font-size: 0.9rem; text-decoration: underline; display: inline-block; margin-top: 16px;">TOPに戻る</a>
                </div>
            </div>
    </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
            <span>TOP</span>
        </a>
        <a href="map.html" class="nav-item">
            <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
            <span>MAP</span>
        </a>
        <a href="schedule.html" class="nav-item">
            <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
            <span>LIVE</span>
        </a>
        <a href="artists.html" class="nav-item">
            <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
            <span>ARTIST</span>
        </a>
        <a href="mypage.html" class="nav-item">
            <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
            <span>MY PAGE</span>
        </a>
    </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
