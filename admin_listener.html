<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ(リスナー) | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .profile-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ccc;
            margin: 0 auto 12px;
            object-fit: cover;
        }

        .icon-edit-wrapper {
            position: relative;
            display: inline-block;
            margin: 0 auto 12px;
        }

        .camera-badge {
            position: absolute;
            bottom: 0px;
            right: 0px;
            background: var(--accent-blue);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            box-shadow: none;
            background: transparent;
            transition: transform 0.2s;
        }

        .camera-badge:active {
            transform: scale(0.9);
        }

        .point-box {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px;
            margin: 0 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fav-artists {
            margin: 0 20px 30px;
        }

        .fav-icons {
            display: flex;
            gap: 16px;
            margin-top: 12px;
        }

        .fav-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--accent-pink);
            object-fit: cover;
        }

        .history-log {
            margin: 0 20px 30px;
        }

        .tab-container {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .tab {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.8rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--accent-pink);
            color: white;
            font-weight: bold;
        }

        .log-window {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 16px;
            height: 250px;
            overflow-y: scroll;
        }

        .log-item {
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .log-date {
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .log-content {
            flex: 1;
        }

        .log-bubble {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 12px;
            display: inline-block;
            border: 1px solid rgba(255, 102, 161, 0.2);
        }

        .log-icon {
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="map.html">会場マップ</a>
            <a href="schedule.html">ライブスケジュール</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="admin_listener.html">マイページ</a>
        </div>

        <main>
            <div class="profile-header">
                <div class="icon-edit-wrapper">
                    <img src="images/artist_aiai.jpg" class="profile-icon">
                    <div class="camera-badge" onclick="alert('画像を選択します（デモ動作）')">
                        <img src="images/icon_camera.svg" alt="camera"
                            style="width: 24px; height: 24px; filter: brightness(0) invert(1) drop-shadow(0 2px 4px rgba(0,0,0,0.5));">
                    </div>
                </div>
                <h2>名無しリスナー</h2>
            </div>

            <div class="point-box">
                <div>
                    <div class="text-secondary" style="font-size: 0.9rem;">利用可能ポイント</div>
                    <div style="font-size: 1.5rem; font-weight: bold; color: var(--accent-cyan);">1000 <span
                            style="font-size:1rem; font-weight:normal;">pt</span></div>
                </div>
                <a href="admin_listener_points.html" class="btn btn-secondary"
                    style="width:auto; padding: 8px 16px;">pt情報</a>
            </div>

            <div class="fav-artists">
                <h3 class="section-title">お気に入りアーティスト</h3>
                <div class="fav-icons">
                    <a href="artist_kosugiyun.html"><img src="images/artist_kosugiyun.jpg" class="fav-icon"></a>
                    <a href="artist_hasetomo_02.html"><img src="images/artist_hasetomo_02.jpg" class="fav-icon"></a>
                </div>
            </div>

            <div class="history-log">
                <h3 class="section-title" style="margin-bottom: 8px;">応援履歴</h3>

                <div class="tab-container">
                    <div class="tab active" onclick="filterLogs('小杉ゆん', this)">小杉ゆん</div>
                    <div class="tab" onclick="filterLogs('海蔵亮太', this)">海蔵亮太</div>
                </div>

                <div class="log-window">

                    <div class="log-item" data-artist="小杉ゆん">
                        <span class="log-date">26/02/11 17:33</span>
                        <span class="log-content"><span class="log-icon">😊</span></span>
                    </div>

                    <div class="log-item" data-artist="小杉ゆん">
                        <span class="log-date">26/02/10 17:35</span>
                        <span class="log-content"><span class="log-icon">❤</span></span>
                    </div>

                    <div class="log-item" data-artist="海蔵亮太">
                        <span class="log-date">26/02/10 17:37</span>
                        <span class="log-content"><span class="log-icon">⭐️</span></span>
                    </div>

                    <div class="log-item" data-artist="小杉ゆん">
                        <span class="log-date">26/02/08 17:40</span>
                        <span class="log-content log-bubble">いつも応援しています！◯◯より</span>
                    </div>

                    <div class="log-item" data-artist="小杉ゆん" style="opacity: 0.5;">
                        <span class="log-date">26/02/07 12:01</span>
                        <span class="log-content"><span class="log-icon">⭐️</span></span>
                    </div>

                </div>
            </div>

            <div style="padding: 0 20px 40px;">
                <a href="admin_listener_settings.html" class="btn btn-secondary mb-4">各種設定の変更</a>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="map.html" class="nav-item">
                <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
                <span>MAP</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                <span>LIVE</span>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="admin_listener.html" class="nav-item active">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
        function filterLogs(artist, el) {
            // タブのアクティブ状態を切り替え
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            // ログの表示/非表示を切り替え
            const items = document.querySelectorAll('.log-item');
            items.forEach(item => {
                const itemArtist = item.getAttribute('data-artist');
                if (artist === 'all' || itemArtist === artist) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    </script>
</body>

</html>
