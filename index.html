<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Liver | NEW NIGHT ENTERTAINMENT</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* トップページ専用スタイル */
    .hero-section {
      position: relative;
      height: 75vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .hero-bg-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .hero-bg.active {
      opacity: 0.75;
    }

    /* 下からの白いグラデーション効果 */
    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 1) 95%);
      z-index: 2;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      width: 100%;
      padding: 0 40px;
      margin-top: -40px;
    }

    .logo-main {
      width: 280px;
      filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.08));
      margin-bottom: 5px;
    }

    .logo-tagline {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--accent-blue);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .next-live-card {
      position: relative;
      z-index: 20;
      margin: -50px 24px 40px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 2.5px solid var(--accent-pink);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      display: block;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 15px 35px rgba(255, 102, 161, 0.15);
      transition: transform 0.3s ease;
    }

    .next-live-card:active {
      transform: scale(0.97);
    }

    .next-live-badge {
      display: inline-block;
      background: var(--accent-pink);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 900;
      padding: 4px 16px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .next-live-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--text-primary);
    }

    .key-message {
      padding: 0 40px 60px;
      text-align: center;
    }

    .key-message p {
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.8;
      color: var(--text-primary);
      margin-bottom: 24px;
    }

    .key-message .sub-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 500;
      line-height: 1.6;
    }

    .action-section {
      padding: 0 30px 40px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn-contact {
      font-size: 0.8rem;
      padding: 10px 20px;
      width: auto;
      align-self: center;
      opacity: 0.7;
    }

    .sponsors {
      padding: 40px 20px;
      text-align: center;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .sponsors-text {
      font-size: 0.7rem;
      color: #999;
      line-height: 1.6;
      font-weight: 600;
    }

    .sns-container {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 30px 0 50px;
    }

    .sns-icon {
      width: 24px;
      height: 24px;
      opacity: 0.6;
      transition: opacity 0.3s;
    }

    .sns-icon:hover {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <!-- トップページはヘッダ非表示 -->

    <main>
      <section class="hero-section">
        <div class="hero-bg-container" id="hero-container">
          <!-- JSで背景画像を生成 -->
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <img src="images/logo_blue.png" alt="Music Liver" class="logo-main">
          <div class="logo-tagline">NEW NIGHT ENTERTAINMENT</div>
        </div>
      </section>

      <a href="schedule.html" class="next-live-card">
        <div class="next-live-badge">NEXT LIVE</div>
        <div class="next-live-title">3/6 fri. 17:30～</div>
      </a>

      <section class="key-message">
        <p>あなたの応援を、<br>どこよりも大きくダイレクトに<br>アーティストへ届けます。</p>
        <div class="sub-text">MusicLiverは、若手アーティストとファンを直接つなぐ新しいプラットフォーム。毎週金曜、ストリートライブ開催中！</div>
      </section>

      <div class="action-section">
        <a href="#" class="btn btn-secondary btn-contact">CONTACT</a>
      </div>

      <!-- SNS -->
      <div class="sns-container">
        <a href="https://x.com/NML_info" target="_blank"><img src="images/icon_x.png" class="sns-icon" alt="X"></a>
        <a href="https://www.instagram.com/nml___official/" target="_blank"><img src="images/icon_instagram.png"
            class="sns-icon" alt="Instagram"></a>
        <a href="https://www.tiktok.com/@info_nml" target="_blank"><img src="images/icon_tiktok.png" class="sns-icon"
            alt="TikTok"></a>
      </div>

      <section class="sponsors">
        <p class="sponsors-text">【特別協賛】三井不動産株式会社</p>
        <p class="sponsors-text">【協力】TOKYO STREET LIVE 4K　日本橋チャンネル</p>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <span class="nav-icon">🏠</span>
        <span>TOP</span>
      </a>
      <a href="map.html" class="nav-item">
        <span class="nav-icon">📍</span>
        <span>MAP</span>
      </a>
      <a href="schedule.html" class="nav-item">
        <span class="nav-icon">🎸</span>
        <span>LIVE</span>
      </a>
      <a href="artists.html" class="nav-item">
        <span class="nav-icon">👥</span>
        <span>ARTIST</span>
      </a>
      <a href="admin_listener.html" class="nav-item">
        <span class="nav-icon">👤</span>
        <span>MY PAGE</span>
      </a>
    </nav>
  </div>

  <script>
    // ヒーロー画像のフェードアニメーション
    const images = [
      'images/artist_muratakazushi.jpg',
      'images/artist_kotaka_01.jpg',
      'images/artist_hasetomo_02.jpg',
      'images/artist_kosugiyun.jpg',
      'images/artist_ototarock.jpg',
      'images/artist_toriirena.jpg',
      'images/artist_aiai.jpg'
    ];

    // シャッフル関数（男女・明暗の偏りを減らすため）
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[array.j]] = [array[j], array[i]];
      }
      return array;
    }

    const container = document.getElementById('hero-container');
    let currentIndex = 0;

    // 画像要素の生成
    images.forEach((src, idx) => {
      const div = document.createElement('div');
      div.className = 'hero-bg' + (idx === 0 ? ' active' : '');
      div.style.backgroundImage = `url('${src}')`;
      container.appendChild(div);
    });

    const bgs = document.querySelectorAll('.hero-bg');

    // 3秒おきの切り替え
    setInterval(() => {
      bgs[currentIndex].classList.remove('active');
      currentIndex = (currentIndex + 1) % bgs.length;
      bgs[currentIndex].classList.add('active');
    }, 3000);
  </script>
</body>

</html>
