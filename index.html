<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本橋 Music Liver</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* トップページ専用スタイル */
    .hero-section {
      position: relative;
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #000;
    }

    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://images.unsplash.com/photo-1516280440502-c28b292e1eef?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');
      background-size: cover;
      background-position: center;
      opacity: 0.5;
      animation: zoom 10s infinite alternate linear;
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    /* ざらっとした質感を重ねる */
    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(11, 12, 16, 0.2), var(--bg-color));
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      width: 100%;
      padding: 0 20px;
    }

    .main-logo {
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }
    .sub-logo {
      font-size: 0.9rem;
      color: var(--accent-cyan);
      letter-spacing: 3px;
      margin-bottom: 40px;
    }

    .live-announcement {
      background: rgba(31, 40, 51, 0.8);
      backdrop-filter: blur(5px);
      border: 1px solid var(--accent-pink);
      border-radius: var(--border-radius);
      padding: 24px;
      margin: 20px;
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .live-announcement .badge {
      display: inline-block;
      background-color: var(--accent-pink);
      color: #fff;
      font-size: 0.8rem;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .live-announcement h3 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .key-message {
      padding: 40px 20px;
      text-align: center;
      background: linear-gradient(180deg, var(--bg-color) 0%, #11151c 100%);
    }

    .key-message p {
      font-size: 1.1rem;
      font-weight: bold;
      line-height: 1.8;
      background: -webkit-linear-gradient(45deg, var(--accent-cyan), var(--text-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .key-message .sub-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 16px;
      -webkit-text-fill-color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo-container">
        <a href="index.html"><h1>Music Liver</h1></a>
      </div>
      <div class="menu-icon">☰</div>
    </header>

    <main>
      <section class="hero-section">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
          <div class="main-logo">日本橋 Music Liver</div>
          <div class="sub-logo">NIGHT ENTERTAINMENT</div>
        </div>
      </section>

      <section class="live-announcement">
        <div class="badge">NEXT LIVE</div>
        <h3>3/4 wed. 18:00～</h3>
        <p class="mb-4 text-secondary">日本橋ストリートにて開催予定</p>
        <a href="map.html" class="btn btn-primary">スケジュールを見る</a>
      </section>

      <section class="key-message">
        <p>あなたの応援を、<br>どこよりも大きくダイレクトに<br>アーティストへ。</p>
        <p class="sub-text mt-4">MusicLiverは、頑張る路上ライブアーティストとファンを直接繋ぐ新しいプラットフォームです。</p>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <span class="nav-icon">🏠</span>
        <span>TOP</span>
      </a>
      <a href="map.html" class="nav-item">
        <span class="nav-icon">📍</span>
        <span>MAP</span>
      </a>
      <a href="artists.html" class="nav-item">
        <span class="nav-icon">🎸</span>
        <span>ARTIST</span>
      </a>
      <a href="admin_listener.html" class="nav-item">
        <span class="nav-icon">👤</span>
        <span>MY PAGE</span>
      </a>
    </nav>
  </div>

  <script>
    // ヒーロー画像の切り替え処理（仮）
    const heroBg = document.getElementById('heroBg');
    const images = [
      'https://images.unsplash.com/photo-1516280440502-c28b292e1eef?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80',
      'https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80',
      'https://images.unsplash.com/photo-1525362081669-2b476bb628c3?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'
    ];
    let currentIndex = 0;

    setInterval(() => {
      heroBg.style.opacity = 0;
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % images.length;
        heroBg.style.backgroundImage = `url('${images[currentIndex]}')`;
        heroBg.style.opacity = 0.5;
      }, 500); // フェードアウトの時間に合わせる
    }, 5000); // 5秒ごとに切り替え
    
    // スムーズなトランジション設定
    heroBg.style.transition = 'opacity 0.5s ease-in-out';
  </script>
</body>
</html>
