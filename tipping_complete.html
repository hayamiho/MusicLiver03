<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-container {
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .artist-img-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
        }

        .artist-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-pink);
            box-shadow: 0 0 30px rgba(255, 102, 161, 0.5);
            position: relative;
            z-index: 2;
        }

        .success-message {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .thanks-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .point-remaining {
            font-weight: bold;
            color: var(--accent-cyan);
            margin-bottom: 30px;
        }

        /* キラキラアニメーション */
        .particle {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            animation: floatOut 1s ease-out forwards;
            z-index: 1;
        }

        @keyframes floatOut {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="map.html">会場マップ</a>
            <a href="schedule.html">ライブスケジュール</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="admin_listener.html">マイページ</a>
        </div>

        <main>
            <div class="success-container" id="successContainer">

                <div class="artist-img-wrapper">
                    <img src="images/artist_kosugiyun.jpg" class="artist-img" alt="小杉ゆん">
                </div>

                <div class="success-message">
                    <span style="color:var(--accent-pink); font-size:1.5rem;">100ポイント</span> で<br>
                    小杉ゆん さんに<span style="color: gold; text-shadow: 0 0 5px gold;">⭐</span>を送りました！
                </div>

                <p class="thanks-message">
                    Music Liverを引き続きお楽しみください。<br>
                    アーティストをフォローすると<br>最新情報などをお届けします！
                </p>

                <div class="point-remaining">
                    利用可能ポイント 900pt
                </div>

                <a href="artist_kosugiyun.html" class="btn btn-secondary">アーティストTOPに戻る</a>

            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="map.html" class="nav-item">
                <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
                <span>MAP</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                <span>LIVE</span>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="admin_listener.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }

        // キラキラアニメーション生成
        const container = document.getElementById('successContainer');
        const wrapper = document.querySelector('.artist-img-wrapper');
        const icons = ['⭐', '⭐', '⭐', '⭐'];

        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = icons[Math.floor(Math.random() * icons.length)];

                p.style.left = '50%';
                p.style.top = '50%';

                // 均等に散らばるように角度と距離を計算
                const angle = (i / 20) * 2 * Math.PI;
                const radius = 100 + Math.random() * 80;
                const tx = Math.cos(angle) * radius + 'px';
                const ty = Math.sin(angle) * radius + 'px';
                p.style.setProperty('--tx', tx);
                p.style.setProperty('--ty', ty);

                wrapper.appendChild(p);
            }, i * 50);
        }
    </script>
</body>

</html>
