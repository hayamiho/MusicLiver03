<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-container {
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .artist-img-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
        }

        .artist-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-pink);
            box-shadow: 0 0 30px rgba(255, 102, 161, 0.5);
            position: relative;
            z-index: 2;
        }

        .success-message {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .thanks-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .point-remaining {
            font-weight: bold;
            color: var(--accent-cyan);
            margin-bottom: 30px;
        }

        /* キラキラアニメーション */
        .particle {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            animation: floatUp 2s ease-out forwards;
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <h1>Music Liver</h1>
            </div>
        </header>

        <main>
            <div class="success-container" id="successContainer">

                <div class="artist-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1516575334481-fec8bb85c986?w=400&h=400&fit=crop"
                        class="artist-img" alt="小杉ゆん">
                </div>

                <div class="success-message">
                    <span style="color:var(--accent-pink); font-size:1.5rem;">100ポイント</span> で<br>
                    小杉ゆん さんに<span style="color: gold; text-shadow: 0 0 5px gold;">☆</span>を送りました！
                </div>

                <p class="thanks-message">
                    MusicLiverを引き続きお楽しみください！<br>
                    アーティストをフォローすると<br>最新情報などをお届けします！
                </p>

                <div class="point-remaining">
                    残り 900pt
                </div>

                <a href="artist_detail.html" class="btn btn-secondary">TOPに戻る</a>

            </div>
        </main>
    </div>

    <script>
        // キラキラアニメーション生成
        const container = document.getElementById('successContainer');
        const wrapper = document.querySelector('.artist-img-wrapper');
        const icons = ['⭐', '✨', '💖', '🎵'];

        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = icons[Math.floor(Math.random() * icons.length)];

                // 開始位置を画像の中央付近に
                p.style.left = '50%';
                p.style.top = '150px';

                // 飛んでいく方向をランダムに
                const tx = (Math.random() - 0.5) * 300 + 'px';
                const ty = (Math.random() - 0.5) * 300 - 100 + 'px';
                p.style.setProperty('--tx', tx);
                p.style.setProperty('--ty', ty);

                container.appendChild(p);
            }, i * 100);
        }
    </script>
</body>

</html>
