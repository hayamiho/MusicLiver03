    <style>
        .success-container {
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .artist-img-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
        }

        .artist-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-pink);
            box-shadow: 0 0 30px rgba(255, 102, 161, 0.5);
            position: relative;
            z-index: 2;
        }

        .success-message {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .thanks-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .point-remaining {
            font-weight: bold;
            color: var(--accent-cyan);
            margin-bottom: 30px;
        }

        /* キラキラアニメーション */
        .particle {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            animation: floatOut 1s ease-out forwards;
            z-index: 1;
        }

        @keyframes floatOut {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }

        // キラキラアニメーション生成
        const container = document.getElementById('successContainer');
        const wrapper = document.querySelector('.artist-img-wrapper');
        const icons = ['⭐', '⭐', '⭐', '⭐'];

        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = icons[Math.floor(Math.random() * icons.length)];

                p.style.left = '50%';
                p.style.top = '50%';

                // 均等に散らばるように角度と距離を計算
                const angle = (i / 20) * 2 * Math.PI;
                const radius = 100 + Math.random() * 80;
                const tx = Math.cos(angle) * radius + 'px';
                const ty = Math.sin(angle) * radius + 'px';
                p.style.setProperty('--tx', tx);
                p.style.setProperty('--ty', ty);

                wrapper.appendChild(p);
            }, i * 50);
        }
    </script>
