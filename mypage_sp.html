<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPoint情報 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .point-header-title {
            text-align: center;
            padding: 24px 20px 0;
            font-size: 1.4rem;
        }

        .sp-detail-box {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px 20px;
            margin: 16px 20px 32px;
            border: 3px solid #ffd700;
            box-shadow: 0 4px 15px rgba(255,215,0,0.1);
        }

        .sp-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .sp-label {
            font-weight: normal;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .sp-value {
            font-size: 1.6rem;
            font-weight: bold;
        }
        .sp-value span {
            font-size: 1rem;
            font-weight: normal;
            margin-left: 2px;
        }

        .btn-exchange {
            background: #ffd700;
            color: #333;
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-decoration: none;
            font-size: 1.1rem;
            max-width: 200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        
        .btn-exchange-wrapper {
            text-align: center;
        }

        .history-section {
            margin: 0 20px 24px;
            padding: 16px 0;
            border-radius: 8px;
        }

        .history-title {
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .history-list {
            background: white;
            border-radius: 8px;
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .history-item:last-child {
            margin-bottom: 0;
        }

        .history-meta {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 4px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .history-action {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message-bubble {
            background: #fffafa;
            border: 1px solid #ffebf0;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-top: 8px;
            position: relative;
        }
        
        /* Custom scrollbar for history list to match mockup */
        .history-list::-webkit-scrollbar {
            width: 6px;
        }
        .history-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
        .history-list::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="#" onclick="event.preventDefault();const b=document.createElement('div');b.className='coming-soon-bubble';b.textContent='近日公開予定';b.style.left=(event.pageX-40)+'px';b.style.top=(event.pageY-40)+'px';document.body.appendChild(b);setTimeout(()=>b.remove(),1500);" style="color: #999;">全国のライブスケジュール一覧</a>
            <a href="live.html">現在演奏中のミュージシャン</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="mypage.html">マイページ</a>
        </div>

        <main>
            <div class="point-header-title">StarPoint 情報</div>

            <div class="sp-detail-box">
                <div class="sp-row">
                    <div class="sp-label">贈られたスターポイント</div>
                    <div class="sp-value">15,000<span>sp</span></div>
                </div>
                <div class="btn-exchange-wrapper">
                    <a href="mypage_sp_convert.html" class="btn-exchange">ポイント交換</a>
                </div>
            </div>

            <div class="history-section">
                <div class="history-title">応援履歴</div>

                <div class="history-list">
                    <div class="history-item">
                        <div class="history-meta">
                            <span>26/02/11 17:33</span>
                            <div class="history-action">
                                <span style="font-size: 1.2rem;">😊</span>
                            </div>
                        </div>
                    </div>

                    <div class="history-item">
                        <div class="history-meta">
                            <span>26/02/10 17:35</span>
                            <div class="history-action">
                                <span style="font-size: 1.2rem;">❤</span>
                            </div>
                        </div>
                    </div>

                    <div class="history-item">
                        <div class="history-meta">
                            <span>26/02/10 17:37</span>
                            <div class="history-action">
                                <span style="font-size: 1.2rem;">⭐</span>
                            </div>
                        </div>
                    </div>

                    <div class="history-item">
                        <div class="history-meta" style="margin-bottom: 0;">
                            <span>26/02/08 17:40</span>
                        </div>
                        <div class="message-bubble">
                            いつも応援しています！〇〇より
                        </div>
                    </div>

                    <div class="history-item">
                        <div class="history-meta">
                            <span>26/02/07 12:01</span>
                            <div class="history-action">
                                <span style="font-size: 1.2rem;">⭐</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="history-item">
                        <div class="history-meta">
                            <span>26/02/07 11:45</span>
                            <div class="history-action">
                                <span style="font-size: 1.2rem;">😊</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="#" onclick="event.preventDefault();const b=document.createElement('div');b.className='coming-soon-bubble';b.textContent='近日公開予定';b.style.left=(event.pageX-30)+'px';b.style.top=(event.pageY-40)+'px';document.body.appendChild(b);setTimeout(()=>b.remove(),1500);" class="nav-item" style="filter: grayscale(100%); opacity: 0.5;">
                <img src="images/icon_schedule.svg" alt="SCHEDULE" class="nav-icon">
                <span>SCHEDULE</span>
            </a>
            <a href="live.html" class="nav-item nav-live-highlight">
                <div class="nav-icon-wrapper">
                    <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                    <span>LIVE</span>
                </div>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="mypage.html" class="nav-item active">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>
</html>
