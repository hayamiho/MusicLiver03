<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarPoint情報 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dist/output.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .point-header-title {
            text-align: center;
            padding: 24px 20px 0;
            font-size: 1.4rem;
        }

        .sp-detail-box {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px 20px;
            margin: 16px 20px 32px;
            border: 3px solid #ffd700;
            box-shadow: 0 4px 15px rgba(255,215,0,0.1);
        }

        .sp-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .sp-label {
            font-weight: normal;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .sp-value {
            font-size: 1.6rem;
            font-weight: bold;
        }
        .sp-value span {
            font-size: 1rem;
            font-weight: normal;
            margin-left: 2px;
        }

        .btn-exchange {
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-decoration: none;
            font-size: 1.1rem;
            max-width: 200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        
        .btn-exchange-wrapper {
            text-align: center;
        }

        .history-section {
            margin: 0 20px 24px;
            padding: 16px 0;
            border-radius: 8px;
        }

        .history-title {
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .history-list {
            background: white;
            border-radius: 8px;
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .history-item:last-child {
            margin-bottom: 0;
        }

        .history-meta {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 4px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .history-action {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message-bubble {
            background: #fffafa;
            border: 1px solid #ffebf0;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-top: 8px;
            position: relative;
        }
        
        /* Custom scrollbar for history list to match mockup */
        .history-list::-webkit-scrollbar {
            width: 6px;
        }
        .history-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
        .history-list::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <img src="images/icon_search.svg" class="menu-icon w-6 h-6 cursor-pointer" onclick="toggleSearch()" alt="検索">
        </header>

            <!-- Search Overlay -->
    <div id="searchOverlay" class="full-modal z-[4000]">
        <div class="modal-header justify-start gap-3 px-5 py-3">
            <button class="modal-close text-[1.8rem] leading-none bg-transparent border-none p-0" onclick="document.getElementById('searchOverlay').classList.remove('active')"><img src="images/icon_arrow2.svg" alt="戻る" class="w-6 h-6 pointer-events-none"></button>
            <div class="flex-1 relative">
                <input type="text" placeholder="MLSSを検索" class="w-full py-[10px] pr-[40px] pl-[16px] rounded-[20px] border-none bg-[#f0f0f0] text-[1rem] outline-none">
                <img src="images/icon_search.svg" class="absolute right-[12px] top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
            </div>
        </div>
        <div class="modal-body p-0">
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">藤田悠也</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">結芽乃 路上ライブ</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">Synphony</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">天野なつ</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">日本橋イベント</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
        </div>
    </div>
    <script>
        function toggleSearch() {
            document.getElementById('searchOverlay').classList.toggle('active');
        }
    </script>

        <main>
            <div class="point-header-title">StarPoint 情報</div>

            <div class="sp-detail-box">
                <div class="sp-row">
                    <div class="sp-label">贈られたスターポイント</div>
                    <div class="sp-value">15,000<span>sp</span></div>
                </div>
                <div class="btn-exchange-wrapper">
                    <a href="mypage_sp_convert.html" class="btn-exchange">ポイント交換</a>
                </div>
            </div>

            <div class="history-section">
                <div class="history-title">応援履歴</div>

                <div class="history-list">
                    <div class="history-item">
                        <div class="history-meta">
                            <span>26/02/11 17:33</span>
                            <div class="history-action">
                                <span class="text-[1.2rem]">😊</span>
                            </div>
                        </div>
                    </div>

                    <div class="history-item">
                        <div class="history-meta">
                            <span>26/02/10 17:35</span>
                            <div class="history-action">
                                <span class="text-[1.2rem]">❤</span>
                            </div>
                        </div>
                    </div>

                    <div class="history-item">
                        <div class="history-meta">
                            <span>26/02/10 17:37</span>
                            <div class="history-action">
                                <span class="text-[1.2rem]">⭐</span>
                            </div>
                        </div>
                    </div>

                    <div class="history-item">
                        <div class="history-meta mb-0">
                            <span>26/02/08 17:40</span>
                        </div>
                        <div class="message-bubble">
                            いつも応援しています！〇〇より
                        </div>
                    </div>

                    <div class="history-item">
                        <div class="history-meta">
                            <span>26/02/07 12:01</span>
                            <div class="history-action">
                                <span class="text-[1.2rem]">⭐</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="history-item">
                        <div class="history-meta">
                            <span>26/02/07 11:45</span>
                            <div class="history-action">
                                <span class="text-[1.2rem]">😊</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="#" onclick="event.preventDefault();const b=document.createElement('div');b.className='coming-soon-bubble';b.textContent='近日公開予定';b.style.left=(event.pageX-30)+'px';b.style.top=(event.pageY-40)+'px';document.body.appendChild(b);setTimeout(()=>b.remove(),1500);" class="nav-item grayscale opacity-50">
                <img src="images/icon_schedule.svg" alt="SCHEDULE" class="nav-icon">
                <span>SCHEDULE</span>
            </a>
            <a href="live.html" class="nav-item nav-live-highlight">
                <div class="nav-icon-wrapper">
                    <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                    <span>LIVE</span>
                </div>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="mypage.html" class="nav-item active">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>
</html>
