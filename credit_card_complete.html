<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クレジットカード登録完了 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .complete-container {
            padding: 40px 20px;
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--accent-cyan);
            margin-bottom: 24px;
        }

        .point-display {
            margin: 30px 0;
            padding: 24px;
            background: var(--bg-card);
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 102, 161, 0.3);
        }

        .point-display h3 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .point-amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-pink);
        }

        .point-unit {
            font-size: 1rem;
            font-weight: normal;
        }

        .target-text {
            margin-top: 12px;
            font-weight: bold;
            color: var(--accent-blue);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="map.html">会場マップ</a>
            <a href="schedule.html">ライブスケジュール</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="admin_listener.html">マイページ</a>
        </div>

        <main>
            <div class="complete-container">
                <div class="success-icon">💳</div>
                <h2 class="section-title text-center">クレジットカード登録が<br>完了しました！</h2>

                <div class="point-display">
                    <h3>利用可能ポイント</h3>
                    <div class="point-amount">0 <span class="point-unit">pt</span></div>
                    <div class="target-text">あと100ptで⭐を送れます</div>
                </div>

                <a href="point_purchase.html" class="btn btn-primary mb-4">ポイントを購入する</a>
                <a href="credit_card.html" class="btn btn-secondary mb-2">戻る</a>
                <br>
                <a href="artist_detail.html"
                    style="color:var(--text-secondary); font-size: 0.9rem; text-decoration: underline; display: inline-block; margin-top: 16px;">TOPに戻る</a>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="map.html" class="nav-item">
                <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
                <span>MAP</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                <span>LIVE</span>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="admin_listener.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
