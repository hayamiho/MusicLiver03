<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クレジットカード登録完了 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .complete-container {
            padding: 40px 20px;
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--accent-cyan);
            margin-bottom: 24px;
        }

        .point-display {
            margin: 30px 0;
            padding: 24px;
            background: var(--bg-card);
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 102, 161, 0.3);
        }

        .point-display h3 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .point-amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-pink);
        }

        .point-unit {
            font-size: 1rem;
            font-weight: normal;
        }

        .target-text {
            margin-top: 12px;
            font-weight: bold;
            color: white;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <h1>Music Liver</h1>
            </div>
        </header>

        <main>
            <div class="complete-container">
                <div class="success-icon">💳</div>
                <h2 class="section-title text-center">クレジットカード登録が<br>完了しました！</h2>

                <div class="point-display">
                    <h3>利用可能ポイント</h3>
                    <div class="point-amount">0 <span class="point-unit">pt</span></div>
                    <div class="target-text">あと100ptで⭐を送れます</div>
                </div>

                <a href="point_purchase.html" class="btn btn-primary mb-4">ポイントを購入する</a>
                <a href="credit_card.html" class="btn btn-secondary mb-2">戻る</a>
                <br>
                <a href="artist_detail.html"
                    style="color:var(--text-secondary); font-size: 0.9rem; text-decoration: underline; display: inline-block; margin-top: 16px;">TOPに戻る</a>
            </div>
        </main>
    </div>
</body>

</html>
