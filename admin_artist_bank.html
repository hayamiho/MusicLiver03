<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>振込先口座設定 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-container {
            padding: 30px 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .col {
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

            <div class="hamburger-menu-content" id="hamburgerMenu">
      <a href="index.html">トップページ</a>
      <a href="#" onclick="event.preventDefault();const b=document.createElement('div');b.className='coming-soon-bubble';b.textContent='近日公開予定';b.style.left=(event.pageX-40)+'px';b.style.top=(event.pageY-40)+'px';document.body.appendChild(b);setTimeout(()=>b.remove(),1500);" style="color: #999;">全国のライブスケジュール一覧</a>
      <a href="live.html">現在演奏中のミュージシャン</a>
      <a href="artists.html">アーティスト一覧</a>
      <a href="mypage.html">マイページ</a>
    </div>

        <main>
            <div class="form-container">
                <h2 class="section-title text-center">振込先情報</h2>
                <p class="text-secondary text-center mb-4" style="font-size: 0.85rem;">ポイント交換による収益を受け取る口座を<br>設定・更新します。
                </p>

                <div class="form-group mt-4">
                    <label>金融機関コード / 銀行名</label>
                    <div class="row">
                        <input type="text" class="form-control" placeholder="0000" style="width: 80px;">
                        <input type="text" class="form-control col" placeholder="〇〇銀行">
                    </div>
                </div>

                <div class="form-group">
                    <label>支店コード / 支店名</label>
                    <div class="row">
                        <input type="text" class="form-control" placeholder="000" style="width: 80px;">
                        <input type="text" class="form-control col" placeholder="〇〇支店">
                    </div>
                </div>

                <div class="form-group">
                    <label>口座種別</label>
                    <select class="form-control" style="appearance: none;">
                        <option>普通口座</option>
                        <option>当座口座</option>
                        <option>貯蓄口座</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>口座番号</label>
                    <input type="tel" class="form-control" placeholder="1234567" maxlength="7">
                </div>

                <div class="form-group mb-4">
                    <label>口座名義（全角カタカナ）</label>
                    <input type="text" class="form-control" placeholder="ヤマダ タロウ">
                </div>

                <div style="text-align: center; margin-top: 30px; margin-bottom: 20px;">
                    <a href="admin_artist.html" class="btn btn-primary mb-4" onclick="alert('口座情報を保存しました。')">保存する</a>
                    <a href="admin_artist_points.html" class="btn btn-secondary">戻る</a>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="map.html" class="nav-item">
                <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
                <span>MAP</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                <span>LIVE</span>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="mypage.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
