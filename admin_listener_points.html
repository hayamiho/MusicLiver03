<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pt情報 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .info-container {
            padding: 30px 20px;
        }

        .info-box {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-amount {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-primary);
        }

        .date-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: block;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="map.html">会場マップ</a>
            <a href="schedule.html">ライブスケジュール</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="admin_listener.html">マイページ</a>
        </div>

        <main>
            <div class="info-container">
                <h2 class="section-title text-center mb-4">CheerPoint情報</h2>

                <div class="info-box">
                    <div class="info-row">
                        <div>
                            <strong>利用可能ポイント</strong>
                        </div>
                        <div class="info-amount" style="color: var(--accent-cyan);">1000<span
                                style="font-size:1rem; font-weight:normal;">pt</span></div>
                    </div>

                    <div class="info-row">
                        <div>
                            <strong>期間限定ポイント</strong>
                            <span class="date-text" style="color:var(--accent-pink);">※ 10日以内に消滅します</span>
                        </div>
                        <div style="text-align: right;">
                            <span class="date-text" style="margin-top:0; margin-bottom:4px;">2026/10/10 消滅</span>
                            <div class="info-amount" style="color: var(--accent-pink);">100<span
                                    style="font-size:1rem; font-weight:normal;">pt</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="text-align: center;">
                    <a href="admin_listener.html" class="btn btn-secondary">戻る</a>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="map.html" class="nav-item">
                <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
                <span>MAP</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                <span>LIVE</span>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="admin_listener.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>
    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
