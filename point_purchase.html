<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポイント購入 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dist/output.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .page-container {
            padding: 30px 20px;
        }

        .point-status {
            text-align: center;
            margin-bottom: 30px;
        }

        .point-status h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .point-amount {
            font-size: 2rem;
            font-weight: bold;
            color: var(--text-primary);
        }

        .plan-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .plan-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .plan-info {
            display: flex;
            flex-direction: column;
        }

        .plan-pt {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-cyan);
        }

        .plan-price {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .btn-buy {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--text-primary);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-buy:active {
            background: var(--text-primary);
            color: var(--bg-color);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
            <img src="images/icon_search.svg" class="menu-icon w-6 h-6 cursor-pointer" onclick="toggleSearch()" alt="検索">
        </header>

                <!-- Search Overlay -->
    <div id="searchOverlay" class="full-modal z-[4000]">
        <div class="modal-header justify-start gap-3 px-5 py-3">
            <button class="modal-close text-[1.8rem] leading-none bg-transparent border-none p-0" onclick="document.getElementById('searchOverlay').classList.remove('active')"><img src="images/icon_arrow2.svg" alt="戻る" class="w-6 h-6 pointer-events-none"></button>
            <div class="flex-1 relative">
                <input type="text" placeholder="MLSSを検索" class="w-full py-[10px] pr-[40px] pl-[16px] rounded-[20px] border-none bg-[#f0f0f0] text-[1rem] outline-none">
                <img src="images/icon_search.svg" class="absolute right-[12px] top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
            </div>
        </div>
        <div class="modal-body p-0">
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">藤田悠也</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">結芽乃 路上ライブ</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">Synphony</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">天野なつ</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
            <div class="flex justify-between items-center px-5 py-4 border-b border-[#f0f0f0]">
                <div class="text-[var(--accent-blue)] font-bold text-[1.1rem]">日本橋イベント</div>
                <div class="text-[var(--accent-blue)] cursor-pointer">削除</div>
            </div>
        </div>
    </div>
    <script>
        function toggleSearch() {
            document.getElementById('searchOverlay').classList.toggle('active');
        }
    </script>

        <main>
            <div class="page-container">
                <h2 class="section-title text-center">ポイント購入</h2>

                <div class="point-status">
                    <h3>利用可能ポイント</h3>
                    <div class="point-amount text-[1rem] font-normal">0 <span>pt</span></div>
                </div>

                <div class="plan-list">
                    <div class="plan-card">
                        <div class="plan-info">
                            <span class="plan-pt">100cp</span>
                            <span class="plan-price">税込 110円</span>
                        </div>
                        <a href="payment.html?pt=100" class="btn-buy">購入する</a>
                    </div>

                    <div class="plan-card">
                        <div class="plan-info">
                            <span class="plan-pt">200cp</span>
                            <span class="plan-price">税込 220円</span>
                        </div>
                        <a href="payment.html?pt=200" class="btn-buy">購入する</a>
                    </div>

                    <div class="plan-card">
                        <div class="plan-info">
                            <span class="plan-pt">300cp</span>
                            <span class="plan-price">税込 330円</span>
                        </div>
                        <a href="payment.html?pt=300" class="btn-buy">購入する</a>
                    </div>

                    <div class="plan-card">
                        <div class="plan-info">
                            <span class="plan-pt">500cp</span>
                            <span class="plan-price">税込 550円</span>
                        </div>
                        <a href="payment.html?pt=500" class="btn-buy">購入する</a>
                    </div>

                    <div class="plan-card border-[var(--accent-pink)]">
                        <div class="plan-info">
                            <span class="plan-pt text-[var(--accent-pink)]">1000cp</span>
                            <span class="plan-price">税込 1100円</span>
                        </div>
                        <a href="payment.html?pt=1000" class="btn-buy"
                            class="border-[var(--accent-pink)] text-[var(--accent-pink)]">購入する</a>
                    </div>

                    <div class="plan-card">
                        <div class="plan-info">
                            <span class="plan-pt">2000cp</span>
                            <span class="plan-price">税込 2200円</span>
                        </div>
                        <a href="payment.html?pt=2000" class="btn-buy">購入する</a>
                    </div>
                </div>

                <div class="text-center mt-[30px]">
                    <a href="credit_card_complete.html" class="btn btn-secondary mb-2">戻る</a>
                </div>
            </div>
        </main>

                <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="#" onclick="event.preventDefault();const b=document.createElement('div');b.className='coming-soon-bubble';b.textContent='近日公開予定';b.style.left=(event.pageX-30)+'px';b.style.top=(event.pageY-40)+'px';document.body.appendChild(b);setTimeout(()=>b.remove(),1500);" class="nav-item grayscale opacity-50">
                <img src="images/icon_schedule.svg" alt="SCHEDULE" class="nav-icon">
                <span>SCHEDULE</span>
            </a>
            <a href="live.html" class="nav-item nav-live-highlight">
                <div class="nav-icon-wrapper">
                    <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                    <span>LIVE</span>
                </div>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="mypage.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
