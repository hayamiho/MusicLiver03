<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .law-container {
            padding: 30px 20px 60px;
        }

        .law-section {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .law-item {
            margin-bottom: 20px;
        }

        .law-item:last-child {
            margin-bottom: 0;
        }

        .law-item h3 {
            font-size: 1rem;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .law-item p {
            color: var(--text-secondary);
            line-height: 1.8;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link" style="margin: 0 auto;">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
        </header>

        <main>
            <div class="law-container">
                <h2 class="section-title text-center mb-4">お問い合わせ</h2>

                <div class="law-section">
                    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 24px;">
                        MusicLiverに関するお問い合わせは、<br>以下の窓口よりお願いいたします。
                    </p>

                    <div class="law-item">
                        <h3>運営事務局</h3>
                        <p>株式会社スパート<br>
                            〒103-0022 東京都中央区日本橋室町4丁目3-5 室四ビル2階<br>
                            TEL: 03-6271-8947<br>
                            （平日 10:00〜18:00）</p>
                    </div>

                    <div class="law-item">
                        <h3>メールでのお問い合わせ</h3>
                        <p><a href="mailto:info@nmusicliver.jp"
                                style="color: var(--accent-blue); font-weight: bold; text-decoration: underline;">info@nmusicliver.jp</a>
                        </p>
                    </div>
                </div>

                <div style="text-align: center;">
                    <a href="javascript:history.back()" class="btn btn-secondary"
                        style="width: auto; padding: 12px 32px;">戻る</a>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
