<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .law-container {
            padding: 30px 20px 60px;
        }

        .law-section {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .law-item {
            margin-bottom: 20px;
        }

        .law-item:last-child {
            margin-bottom: 0;
        }

        .law-item h3 {
            font-size: 1rem;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .law-item p {
            color: var(--text-secondary);
            line-height: 1.8;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link" style="margin: 0 auto;">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
        </header>

        <main>
            <div class="law-container">
                <h2 class="section-title text-center mb-4">お問い合わせ</h2>

                <div class="law-section">
                    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 24px;">
                        出演者情報・出演希望に関するご質問など、お気軽にお問い合わせください。
                    </p>

                    <form action="#" method="POST" class="contact-form">
                        <div class="form-group mb-4">
                            <label style="display:block; margin-bottom: 8px; font-weight: bold;">お名前（ハンドルネーム可） <span
                                    style="color: var(--accent-pink);">*</span></label>
                            <input type="text" class="form-control" placeholder="例）日本橋 太郎" required
                                style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
                        </div>

                        <div class="form-group mb-4">
                            <label style="display:block; margin-bottom: 8px; font-weight: bold;">電話番号（任意）</label>
                            <input type="tel" class="form-control" placeholder="例）03-1234-5678"
                                style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
                        </div>

                        <div class="form-group mb-4">
                            <label style="display:block; margin-bottom: 8px; font-weight: bold;">メールアドレス <span
                                    style="color: var(--accent-pink);">*</span></label>
                            <input type="email" class="form-control" placeholder="例）info@example.com" required
                                style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
                        </div>

                        <div class="form-group mb-4">
                            <label style="display:block; margin-bottom: 8px; font-weight: bold;">お問い合わせ内容 <span
                                    style="color: var(--accent-pink);">*</span></label>
                            <textarea class="form-control" rows="5" placeholder="お問い合わせ内容をご記入ください" required
                                style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;"></textarea>
                        </div>

                        <div class="form-group mb-4" style="text-align: center;">
                            <label style="display: inline-flex; align-items: center; cursor: pointer;">
                                <input type="checkbox" required style="margin-right: 8px; transform: scale(1.2);">
                                <span><a href="https://www.spart.co.jp/privacy.html" target="_blank"
                                        style="color: var(--accent-blue); text-decoration: underline;">プライバシーポリシー</a>に同意する</span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 20px;"
                            onclick="alert('送信しました。（デモ）'); return false;">送信する</button>
                    </form>
                </div>

                <div style="text-align: center;">
                    <a href="javascript:history.back()" class="btn btn-secondary"
                        style="width: auto; padding: 12px 32px;">戻る</a>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
