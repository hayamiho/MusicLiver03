<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dist/output.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .law-container {
            padding: 30px 20px 60px;
        }

        .law-section {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .law-item {
            margin-bottom: 20px;
        }

        .law-item:last-child {
            margin-bottom: 0;
        }

        .law-item h3 {
            font-size: 1rem;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .law-item p {
            color: var(--text-secondary);
            line-height: 1.8;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link mx-auto">
                <img src="images/logo-mlss.png" alt="Music Liver" class="header-logo">
            </a>
        </header>

        <main>
            <div class="law-container">
                <h2 class="section-title text-center mb-4">お問い合わせ</h2>

                <div class="law-section">
                    <p class="text-center text-[var(--text-secondary)] mb-6">
                        出演者情報・出演希望に関するご質問など、お気軽にお問い合わせください。
                    </p>

                    <form action="#" method="POST" class="contact-form">
                        <div class="form-group mb-4">
                            <label class="block mb-2 font-bold">お名前（ハンドルネーム可） <span
                                    class="text-[var(--accent-pink)]">*</span></label>
                            <input type="text" class="form-control" placeholder="例）日本橋 太郎" required
                                class="w-full p-3 rounded-lg border border-[#ccc]">
                        </div>

                        <div class="form-group mb-4">
                            <label class="block mb-2 font-bold">電話番号（任意）</label>
                            <input type="tel" class="form-control" placeholder="例）03-1234-5678"
                                class="w-full p-3 rounded-lg border border-[#ccc]">
                        </div>

                        <div class="form-group mb-4">
                            <label class="block mb-2 font-bold">メールアドレス <span
                                    class="text-[var(--accent-pink)]">*</span></label>
                            <input type="email" class="form-control" placeholder="例）info@example.com" required
                                class="w-full p-3 rounded-lg border border-[#ccc]">
                        </div>

                        <div class="form-group mb-4">
                            <label class="block mb-2 font-bold">お問い合わせ内容 <span
                                    class="text-[var(--accent-pink)]">*</span></label>
                            <textarea class="form-control" rows="5" placeholder="お問い合わせ内容をご記入ください" required
                                class="w-full p-3 rounded-lg border border-[#ccc]"></textarea>
                        </div>

                        <div class="form-group mb-4 text-center">
                            <label class="inline-flex items-center cursor-pointer">
                                <input type="checkbox" required class="mr-2 scale-[1.2]">
                                <span><a href="https://www.spart.co.jp/privacy.html" target="_blank"
                                        class="text-[var(--accent-blue)] underline">プライバシーポリシー</a>に同意する</span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary w-full mb-5"
                            onclick="alert('送信しました。（デモ）'); return false;">送信する</button>
                    </form>
                </div>

                <div class="text-center">
                    <a href="javascript:history.back()" class="btn btn-secondary"
                        class="w-auto px-8 py-3">戻る</a>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
