<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電話番号入力 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 2px;
            background: #ccc;
            z-index: 0;
        }

        .step {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid #ccc;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .step.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .step.done {
            background: #ccc;
            border-color: #ccc;
            color: #fff;
        }

        .form-container {
            padding: 20px;
            text-align: center;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            font-size: 1.5rem;
            text-align: center;
            background: #fff;
            border: 2px solid #ccc;
            border-radius: var(--border-radius);
            color: var(--text-primary);
            margin: 24px 0;
            letter-spacing: 2px;
        }

        .input-field:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
        }

        .hint-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="map.html">会場マップ</a>
            <a href="schedule.html">ライブスケジュール</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="admin_listener.html">マイページ</a>
        </div>

        <main>
            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step active">2</div>
                <div class="step">3</div>
                <div class="step">4</div>
                <div class="step">5</div>
            </div>

            <div class="form-container">
                <h2 class="section-title">SMS認証</h2>
                <p>携帯電話の電話番号をご入力ください。</p>

                <input type="tel" class="input-field" placeholder="090-1234-5678"
                    oninput="this.value = this.value.replace(/[^0-9-]/g, '')">

                <div class="hint-text">
                    認証番号がショートメッセージで届きます
                </div>

                <a href="register_sms.html" class="btn btn-primary mb-4">送信</a>
                <a href="register_start.html" class="btn btn-secondary">戻る</a>
            </div>
        </main>
    </div>
    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
