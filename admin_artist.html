<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アーティスト管理 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* リスナー管理と同じ構造をベースに使い回す */
        .profile-header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .profile-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ccc;
            margin: 0 auto 12px;
            object-fit: cover;
        }

        .point-box {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px;
            margin: 0 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-log {
            margin: 0 20px 30px;
        }

        .log-window {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 16px;
            height: 250px;
            overflow-y: scroll;
        }

        .log-item {
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .log-date {
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .log-content {
            flex: 1;
        }

        .log-bubble {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 12px;
            display: inline-block;
            border: 1px solid rgba(255, 102, 161, 0.2);
        }

        .log-icon {
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <h1>Music Liver</h1>
            </div>
            <div><span style="font-size: 0.7rem; color:var(--accent-pink); border: 1px solid; padding: 2px 4px;">ARTIST
                    MODE</span></div>
        </header>

        <main>
            <div class="profile-header">
                <img src="images/artist_kosugiyun.jpg" class="profile-icon">
                <h2>小杉ゆん</h2>
            </div>

            <div class="point-box" style="border-color: var(--accent-pink);">
                <div>
                    <div class="text-secondary" style="font-size: 0.9rem;">保有ポイント</div>
                    <div style="font-size: 1.5rem; font-weight: bold; color: var(--text-primary);">12000 <span
                            style="font-size:1rem; font-weight:normal;">pt</span></div>
                </div>
                <a href="admin_artist_points.html" class="btn btn-primary"
                    style="width:auto; padding: 8px 16px;">pt交換</a>
            </div>

            <div class="history-log">
                <h3 class="section-title">応援ログ</h3>
                <div class="log-window">

                    <div class="log-item">
                        <span class="log-date">26/02/11 17:33</span>
                        <span class="log-content"><span class="log-icon">😊</span></span>
                    </div>

                    <div class="log-item">
                        <span class="log-date">26/02/10 17:35</span>
                        <span class="log-content"><span class="log-icon">❤</span></span>
                    </div>

                    <div class="log-item">
                        <span class="log-date">26/02/10 17:37</span>
                        <span class="log-content"><span class="log-icon">⭐️</span></span>
                    </div>

                    <div class="log-item">
                        <span class="log-date">26/02/08 17:40</span>
                        <span class="log-content log-bubble">いつも応援しています！◯◯より</span>
                    </div>

                    <div class="log-item" style="opacity: 0.5;">
                        <span class="log-date">26/02/07 12:01</span>
                        <span class="log-content"><span class="log-icon">⭐️</span></span>
                    </div>

                    <div style="text-align:center; font-size: 0.8rem; color: var(--text-secondary); margin-top: 10px;">
                        ... 下に続きがあります ...</div>
                </div>
            </div>

            <div style="padding: 0 20px 40px;">
                <a href="#" class="btn btn-secondary mb-4">アーティスト情報の設定</a>

                <br><br>
                <div style="text-align: center;">
                    <a href="admin_listener.html"
                        style="font-size:0.8rem; color: #666; text-decoration: underline;">[確認用デモ導線：リスナー管理画面へ戻る]</a>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
