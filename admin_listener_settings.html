<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>各種設定 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .settings-container {
            padding: 30px 20px;
        }

        .settings-list {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .settings-item {
            display: block;
            padding: 20px;
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-item::after {
            content: '>';
            position: absolute;
            right: 20px;
            color: var(--text-secondary);
        }

        .settings-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .external-link::after {
            content: '↗';
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="map.html">会場マップ</a>
            <a href="schedule.html">ライブスケジュール</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="admin_listener.html">マイページ</a>
        </div>

        <main>
            <div class="settings-container">
                <h2 class="section-title text-center mb-4">設定画面</h2>

                <div class="settings-list">
                    <a href="#" class="settings-item">登録情報</a>
                    <a href="#" class="settings-item">口座情報</a>
                    <a href="payment.html?pt=GMO_Ext" class="settings-item external-link">クレカ情報 (外部決済サービス設定)</a>
                </div>

                <div style="text-align: center; margin-top: 30px;">
                    <a href="admin_listener.html" class="btn btn-secondary">戻る</a>
                    <br><br>
                    <a href="admin_artist.html"
                        style="font-size:0.8rem; color: #666; text-decoration: underline;">[確認用デモ導線：アーティスト管理画面へ]</a>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="images/icon_top.svg" alt="TOP" class="nav-icon">
                <span>TOP</span>
            </a>
            <a href="map.html" class="nav-item">
                <img src="images/icon_map.svg" alt="MAP" class="nav-icon">
                <span>MAP</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <img src="images/icon_live.svg" alt="LIVE" class="nav-icon">
                <span>LIVE</span>
            </a>
            <a href="artists.html" class="nav-item">
                <img src="images/icon_artist.svg" alt="ARTIST" class="nav-icon">
                <span>ARTIST</span>
            </a>
            <a href="admin_listener.html" class="nav-item">
                <img src="images/icon_mypage.svg" alt="MY PAGE" class="nav-icon">
                <span>MY PAGE</span>
            </a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
