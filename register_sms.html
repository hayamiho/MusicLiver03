<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS認証 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 2px;
            background: #ccc;
            z-index: 0;
        }

        .step {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid #ccc;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .step.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .step.done {
            background: #ccc;
            border-color: #ccc;
            color: #fff;
        }

        .form-container {
            padding: 20px;
            text-align: center;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            font-size: 2rem;
            text-align: center;
            background: #fff;
            border: 2px solid #ccc;
            border-radius: var(--border-radius);
            color: var(--text-primary);
            margin: 24px 0;
            letter-spacing: 8px;
        }

        .input-field:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <a href="index.html" class="logo-link">
                <img src="images/logo_blue.png" alt="Music Liver" class="header-logo">
            </a>
            <div class="menu-icon" onclick="toggleMenu()">≡</div>
        </header>

        <div class="hamburger-menu-content" id="hamburgerMenu">
            <a href="index.html">トップページ</a>
            <a href="map.html">会場マップ</a>
            <a href="schedule.html">ライブスケジュール</a>
            <a href="artists.html">アーティスト一覧</a>
            <a href="admin_listener.html">マイページ</a>
        </div>

        <main>
            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step active">3</div>
                <div class="step">4</div>
                <div class="step">5</div>
            </div>

            <div class="form-container">
                <h2 class="section-title">SMS認証</h2>
                <p>SMSに届いた4桁の認証番号を<br>ご入力ください。</p>

                <input type="number" class="input-field" placeholder="1234" maxlength="4"
                    oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">

                <div id="resend-message"
                    style="display: none; background: rgba(52, 199, 89, 0.1); color: #34c759; border: 1px solid #34c759; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 15px; font-weight: bold;">
                    新しい認証コードを送信しました。
                </div>
                <p class="mb-4 text-secondary" style="font-size:0.8rem;">※認証番号が届かない場合は：<a href="#" id="resend-btn"
                        style="color:var(--accent-cyan); font-weight:bold;">番号を再送</a></p>

                <a href="register_terms.html" class="btn btn-primary mb-4">送信</a>
                <a href="register_phone.html" class="btn btn-secondary">戻る</a>
            </div>
        </main>
    </div>
    <script>
        document.getElementById('resend-btn').addEventListener('click', function (e) {
            e.preventDefault();
            const btn = this;
            const msg = document.getElementById('resend-message');

            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
            btn.innerText = '送信中...';

            setTimeout(() => {
                msg.style.display = 'block';
                btn.innerText = '番号を再送';
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';

                setTimeout(() => {
                    msg.style.display = 'none';
                }, 3000);
            }, 1000);
        });

        function toggleMenu() {
            document.getElementById('hamburgerMenu').classList.toggle('open');
        }
    </script>
</body>

</html>
