<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS認証 | 日本橋 Music Liver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 0;
        }

        .step {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .step.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .step.done {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.5);
            color: #000;
        }

        .form-container {
            padding: 20px;
            text-align: center;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            font-size: 2rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--accent-cyan);
            border-radius: var(--border-radius);
            color: white;
            margin: 24px 0;
            letter-spacing: 8px;
        }

        .input-field:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <h1>Music Liver</h1>
            </div>
        </header>

        <main>
            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step done">✓</div>
                <div class="step active">3</div>
                <div class="step">4</div>
                <div class="step">5</div>
            </div>

            <div class="form-container">
                <h2 class="section-title">SMS認証</h2>
                <p>SMSに届いた4桁の認証番号を<br>ご入力ください。</p>

                <input type="number" class="input-field" placeholder="1234" maxlength="4"
                    oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">

                <p class="mb-4 text-secondary" style="font-size:0.8rem;">※認証番号が届かない場合は<a href="#"
                        style="color:var(--accent-cyan)">こちら</a></p>

                <a href="register_terms.html" class="btn btn-primary mb-4">送信</a>
                <a href="register_phone.html" class="btn btn-secondary">戻る</a>
            </div>
        </main>
    </div>
</body>

</html>
